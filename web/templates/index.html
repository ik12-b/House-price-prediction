<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium House Price Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="glass-container">
        <header>
            <h1>House Price Prediction</h1>
            <p class="subtitle">Amsterdam Market Intelligence</p>
        </header>

        <form id="predictionForm" class="prediction-form">
            <div class="input-grid">
                <div class="input-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" placeholder="e.g. Blasiusstraat 8, Amsterdam"
                        required>
                </div>
                <div class="input-group">
                    <label for="zip">Zip Code</label>
                    <input type="text" id="zip" name="zip" placeholder="e.g. 1091 CR" required>
                </div>
                <div class="input-group">
                    <label for="area">Area (m²)</label>
                    <input type="number" id="area" name="area" placeholder="64" required>
                </div>
                <div class="input-group">
                    <label for="rooms">Rooms</label>
                    <input type="number" id="rooms" name="rooms" placeholder="3" required>
                </div>
                <div class="input-group">
                    <label for="lon">Longitude</label>
                    <input type="number" id="lon" name="lon" step="any" placeholder="4.9077" required>
                </div>
                <div class="input-group">
                    <label for="lat">Latitude</label>
                    <input type="number" id="lat" name="lat" step="any" placeholder="52.3561" required>
                </div>
            </div>

            <button type="submit" id="predictBtn">
                <span class="btn-text">Predict Market Value</span>
                <div class="loader" id="loader"></div>
            </button>
        </form>

        <div class="result-card" id="resultCard">
            <h3>Estimated Value</h3>
            <p id="predictionValue" class="prediction-value">---</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Amsterdam Real Estate Predictor</p>
    </footer>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('predictBtn');
            const loader = document.getElementById('loader');
            const btnText = btn.querySelector('.btn-text');
            const resultCard = document.getElementById('resultCard');
            const predictionValue = document.getElementById('predictionValue');

            // Loading state
            btn.disabled = true;
            loader.style.display = 'block';
            btnText.style.opacity = '0.5';

            try {
                const formData = new FormData(e.target);
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    predictionValue.innerText = data.prediction;
                    resultCard.classList.add('show');
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('An unexpected error occurred.');
                console.error(error);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
                btnText.style.opacity = '1';
            }
        });
    </script>
</body>

</html>
